name: Deploy Frontend to VM (Docker + Nginx)

on:
  push:
    branches:
      - dev
      - main
      - feature/*
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: studioapp-frontend
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: joelwembo
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD || 'dckr_pat_FrPv8CGBMEdeaR4GOrYO4kf6mHA' }}
  NODE_VERSION: '20'
  VM_HOST: ${{ secrets.VM_HOST }}
  VM_APP_DIR: /home/ubuntu/studioapp-frontend
  REMOTE_USER: ${{ secrets.VM_USERNAME || 'ubuntu' }}
  # SSL: domain for Let's Encrypt (IP 34.201.69.202 cannot get a public cert; use valtunox.com)
  SSL_DOMAIN: valtunox.com
  SSL_CERTS_PATH_DEFAULT: /etc/letsencrypt/live/valtunox.com

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            NEXT_PUBLIC_QUEUE_URL=${{ secrets.NEXT_PUBLIC_QUEUE_URL }}
            NEXT_PUBLIC_TEMPLATE_CODE_AI_1_BACKEND_URL=${{ secrets.NEXT_PUBLIC_TEMPLATE_CODE_AI_1_BACKEND_URL }}
            NEXT_PUBLIC_TEMPLATE_CODE_AI_2_BACKEND_URL=${{ secrets.NEXT_PUBLIC_TEMPLATE_CODE_AI_2_BACKEND_URL }}
            NEXT_PUBLIC_TEMPLATE_CODE_AI_3_BACKEND_URL=${{ secrets.NEXT_PUBLIC_TEMPLATE_CODE_AI_3_BACKEND_URL }}

      - name: Build Summary
        run: |
          echo "## 🐳 Frontend Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp docker-compose.deploy.yml deploy/docker-compose.yml
          cp -r nginx deploy/
          # SSL: use secret SSL_CERTS_PATH or default for valtunox.com
          SSL_PATH="${{ secrets.SSL_CERTS_PATH }}"
          if [ -z "$SSL_PATH" ]; then
            SSL_PATH="${{ env.SSL_CERTS_PATH_DEFAULT }}"
          fi
          cat > deploy/.env << EOF
          FRONTEND_IMAGE=${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          NGINX_IMAGE=nginx-proxy:latest
          SSL_CERTS_PATH=${SSL_PATH}
          EOF
          echo "✅ Deployment package: docker-compose.yml, .env (SSL_CERTS_PATH=${SSL_PATH}), nginx/"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write key: restore newlines if stored as literal \n (e.g. from pasted PEM in secrets)
          KEY="${{ secrets.VM_SSH_KEY }}"
          echo "$KEY" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Ensure key looks valid (do not print key)
          head -1 ~/.ssh/deploy_key | grep -q "BEGIN.*PRIVATE KEY" || (echo "Invalid key: first line should be -----BEGIN...PRIVATE KEY-----"; exit 1)
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test VM connectivity
        continue-on-error: true
        run: |
          for i in 1 2 3; do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=5 ${{ env.REMOTE_USER }}@${{ env.VM_HOST }} "echo ok"; then
              echo "✅ VM reachable"; exit 0
            fi
            echo "⏳ Attempt $i/3..."; sleep 5
          done
          echo "⚠️ VM connectivity failed"

      - name: Copy deployment to VM
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.REMOTE_USER }}@${{ env.VM_HOST }} "mkdir -p ${{ env.VM_APP_DIR }}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy/.env deploy/docker-compose.yml ${{ env.REMOTE_USER }}@${{ env.VM_HOST }}:${{ env.VM_APP_DIR }}/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r deploy/nginx ${{ env.REMOTE_USER }}@${{ env.VM_HOST }}:${{ env.VM_APP_DIR }}/

      - name: Deploy on VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.REMOTE_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            echo "================================================"
            echo "🚀 Frontend (Docker + Nginx) Deployment"
            echo "================================================"
            cd ${{ env.VM_APP_DIR }}

            echo "🔐 Docker Hub login..."
            echo "${{ env.DOCKER_PASSWORD }}" | sudo docker login ${{ env.DOCKER_REGISTRY }} -u ${{ env.DOCKER_USERNAME }} --password-stdin

            echo "📦 Pulling frontend image..."
            sudo docker pull ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

            echo "🛑 Stopping existing containers (free port 80 for certbot if needed)..."
            sudo docker compose down --remove-orphans || true

            echo "----------------------------------------"
            echo "🔒 SSL: check if certificate already exists"
            echo "----------------------------------------"
            SSL_DOMAIN="${{ env.SSL_DOMAIN }}"
            CERT_DIR="/etc/letsencrypt/live/${SSL_DOMAIN}"
            if [ -f "${CERT_DIR}/fullchain.pem" ] && [ -f "${CERT_DIR}/privkey.pem" ]; then
              echo "✅ SSL certificate already exists for ${SSL_DOMAIN} — skip install"
            else
              echo "📜 No certificate found — installing via Let's Encrypt (${SSL_DOMAIN}, www.${SSL_DOMAIN})..."
              sudo apt-get update -qq && sudo apt-get install -y -qq certbot > /dev/null 2>&1 || true
              if ! command -v certbot >/dev/null 2>&1; then
                echo "⚠️ certbot not installed; skipping SSL. Install on VM and re-run to get HTTPS."
              else
                LETSENCRYPT_EMAIL="${{ secrets.LETSENCRYPT_EMAIL }}"
                if [ -z "$LETSENCRYPT_EMAIL" ]; then
                  echo "⚠️ Secret LETSENCRYPT_EMAIL not set; skipping SSL. Set it in repo secrets and re-run."
                else
                  sudo certbot certonly --standalone -d "${SSL_DOMAIN}" -d "www.${SSL_DOMAIN}" \
                    --non-interactive --agree-tos -m "${LETSENCRYPT_EMAIL}" --no-eff-email || true
                  if [ -f "${CERT_DIR}/fullchain.pem" ]; then
                    echo "✅ SSL certificate installed for ${SSL_DOMAIN}"
                  else
                    echo "⚠️ certbot did not create cert (check DNS: ${SSL_DOMAIN} must point to this VM). Continuing with HTTP only."
                  fi
                fi
              fi
            fi
            echo "----------------------------------------"

            echo "🚀 Starting frontend + nginx (frontend=image only, nginx=build)..."
            COMPOSE_OK=0
            for i in 1 2 3; do
              if sudo docker compose up -d --build; then
                COMPOSE_OK=1
                break
              fi
              echo "⏳ Attempt $i/3 failed (e.g. registry EOF), retrying in 10s..."
              sleep 10
            done
            if [ "$COMPOSE_OK" -ne 1 ]; then
              echo "❌ docker compose up failed after 3 attempts"
              exit 1
            fi

            echo "⏳ Waiting for services..."
            sleep 15

            echo "📊 Container status:"
            sudo docker compose ps
            sudo docker compose logs --tail=15

            echo "================================================"
            echo "🎉 Deployment completed"
            echo "================================================"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.REMOTE_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            echo "🏥 Health check..."
            sleep 5
            if ! sudo docker ps | grep -q frontend; then
              echo "❌ Frontend container not running"; sudo docker compose -f ${{ env.VM_APP_DIR }}/docker-compose.yml logs; exit 1
            fi
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost/health > /dev/null 2>&1 || curl -sf http://localhost/ > /dev/null 2>&1; then
                echo "✅ App responding on port 80"; exit 0
              fi
              echo "⏳ Attempt $i/5..."; sleep 5
            done
            echo "❌ Health check failed"; exit 1

      - name: Deployment Summary
        if: success()
        run: |
          echo "## ✅ Frontend Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "**Target VM:** ${{ env.VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Public URL:** http://${{ env.VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**HTTPS (if cert exists):** https://${{ env.SSL_DOMAIN }} | https://www.${{ env.SSL_DOMAIN }}" >> $GITHUB_STEP_SUMMARY

      - name: Failure summary
        if: failure()
        run: |
          echo "## ❌ Frontend Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "**VM:** ${{ env.VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "Check workflow logs and VM: \`ssh ${{ env.REMOTE_USER }}@${{ env.VM_HOST }} 'cd ${{ env.VM_APP_DIR }} && docker compose logs'\`" >> $GITHUB_STEP_SUMMARY
