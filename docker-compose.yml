services:
  frontend:
    container_name: studioapp-frontend
    image: ${FRONTEND_IMAGE:-studioapp-frontend:latest}
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3008:3008"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3008/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - studioapp-net

  nginx:
    container_name: studioapp-nginx
    image: ${NGINX_IMAGE:-studioapp-nginx:latest}
    restart: unless-stopped
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        APP_PORT: 3008
        HTTP_PORT: 80
    ports:
      - "80:80"
      - "443:443"
    environment:
      - app_name=studioapp-frontend
      - app_port=3008
    volumes:
      - ${SSL_CERTS_PATH:-./certs}:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - studioapp-net

networks:
  studioapp-net:
    driver: bridge
